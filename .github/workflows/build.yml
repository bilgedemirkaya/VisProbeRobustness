name: Build and Validate

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [created]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.9", "3.10", "3.11"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build wheel

    - name: Build package
      run: |
        python -m build

    - name: Install package
      run: |
        pip install dist/*.whl

    - name: Validate imports
      run: |
        python -c "from visprobe import search, list_presets, list_perturbations; print('Package import successful')"
        python -c "from visprobe.strategies import Strategy; print('Strategies import successful')"
        python -c "from visprobe.properties import Property; print('Properties import successful')"

    - name: Run basic example (dry run)
      run: |
        python -c "
from visprobe import list_presets, list_perturbations
print('Available presets:', list(list_presets().keys()))
print('Available perturbations:', len(list_perturbations()))
"

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'release'

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install build tools
      run: |
        python -m pip install --upgrade pip
        pip install build twine

    - name: Build package
      run: python -m build

    - name: Publish to PyPI
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
      run: |
        twine upload dist/*