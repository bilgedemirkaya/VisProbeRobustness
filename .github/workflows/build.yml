name: Build and Validate

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [created]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.9", "3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build wheel pytest

      - name: Build wheel
        run: python -m build

      - name: Install wheel
        # `pip install dist/*.whl` is bash-only; use Python so it works on Windows too.
        run: python -c "import glob, subprocess, sys; subprocess.check_call([sys.executable, '-m', 'pip', 'install', glob.glob('dist/*.whl')[0]])"

      - name: Smoke-test v3 public API
        run: |
          python -c "
          from visprobe import (
              CompositionalExperiment,
              CompositionalResults,
              EvaluationResult,
              get_standard_perturbations,
              GaussianBlur, GaussianNoise, Brightness, LowLight,
              attacks,
              robustbench_eval,
              RobustBenchClient,
              LeaderboardComparison,
              ProtocolError,
              validate_protocol,
          )
          # Verify shipped snapshots are loadable from the installed wheel.
          client = RobustBenchClient('cifar10', 'Linf')
          assert len(client) > 0, 'cifar10 snapshot must be non-empty'
          client = RobustBenchClient('imagenet', 'Linf')
          assert len(client) > 0, 'imagenet snapshot must be non-empty'
          print('v3 public API + snapshot data ship correctly.')
          "

      - name: Run test suite
        run: pytest tests/ -v

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    permissions:
      id-token: write   # for trusted publishing if you switch to OIDC later
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build package
        run: python -m build

      - name: Twine check
        run: python -m twine check dist/*

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: python -m twine upload dist/*
