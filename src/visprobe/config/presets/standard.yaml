# Standard Robustness Test (Legacy Preset)
# Balanced mix of natural perturbations including compositional failures

name: Standard Robustness Test (Legacy)
description: Balanced mix of natural perturbations including compositional failures

threat_model: environmental
threat_model_description: Legacy preset - equivalent to 'natural' with fewer strategies

legacy: true
migration_hint: Consider using 'natural' for similar results or 'comprehensive' for complete testing

strategies:
  - type: brightness
    min_level: 0.6
    max_level: 1.4

  - type: gaussian_blur
    kernel_size: 5
    min_level: 0.0
    max_level: 2.5

  - type: gaussian_noise
    min_level: 0.0
    max_level: 0.03

  - type: jpeg_compression
    min_level: 40
    max_level: 100

  - type: compositional
    name: low_light_blur
    components:
      - type: brightness
        level_range: [0.4, 0.7]
      - type: gaussian_blur
        level_range: [1.0, 2.0]

  - type: compositional
    name: compressed_noisy
    components:
      - type: jpeg_compression
        level_range: [20, 50]
      - type: gaussian_noise
        level_range: [0.02, 0.05]

property: label_constant
search_budget: 2000
compute_cost: low

use_cases:
  - General robustness testing
  - Pre-deployment validation
  - Comparing model architectures

estimated_time: 10-15 minutes for 100 images
