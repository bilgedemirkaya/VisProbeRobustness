# Blur & Defocus (Legacy Preset)
# Tests robustness to various types of blur and compression artifacts

name: Blur & Defocus (Legacy)
description: Tests robustness to various types of blur and compression artifacts

threat_model: environmental
threat_model_description: Legacy blur-focused subset of natural perturbations

legacy: true
migration_hint: Consider using 'natural' for broader coverage

strategies:
  - type: gaussian_blur
    kernel_size: 5
    min_level: 0.0
    max_level: 3.0

  - type: motion_blur
    min_level: 1
    max_level: 25
    angle: 0

  - type: jpeg_compression
    min_level: 30
    max_level: 100

  - type: compositional
    name: motion_compressed
    components:
      - type: motion_blur
        level_range: [10, 20]
      - type: jpeg_compression
        level_range: [40, 60]

property: label_constant
search_budget: 1200
compute_cost: low

use_cases:
  - Motion/camera shake
  - Out-of-focus images
  - Video frame compression

estimated_time: 6-10 minutes for 100 images
