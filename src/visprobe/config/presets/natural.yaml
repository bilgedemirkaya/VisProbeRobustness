# Natural Robustness Test Preset
# Tests robustness to realistic environmental perturbations (no adversary)

name: Natural Robustness Test
description: Tests robustness to realistic environmental perturbations

threat_model: environmental
threat_model_description: No adversary - only natural/environmental variations

strategies:
  # Single natural perturbations
  - type: brightness
    min_level: 0.5
    max_level: 1.5

  - type: contrast
    min_level: 0.6
    max_level: 1.4

  - type: gaussian_blur
    kernel_size: 5
    min_level: 0.0
    max_level: 3.0

  - type: gaussian_noise
    min_level: 0.0
    max_level: 0.05

  - type: jpeg_compression
    min_level: 20
    max_level: 100

  - type: gamma
    min_level: 0.6
    max_level: 1.4

  # Compositional natural perturbations
  - type: compositional
    name: low_light_blur
    description: Low-light conditions with motion blur (e.g., night driving)
    components:
      - type: brightness
        level_range: [0.4, 0.7]
      - type: gaussian_blur
        level_range: [1.0, 2.5]

  - type: compositional
    name: compressed_noisy
    description: Heavy compression with sensor noise (e.g., low-bandwidth video)
    components:
      - type: jpeg_compression
        level_range: [20, 50]
      - type: gaussian_noise
        level_range: [0.02, 0.04]

  - type: compositional
    name: dim_low_contrast
    description: Dim lighting with reduced contrast (e.g., foggy conditions)
    components:
      - type: brightness
        level_range: [0.4, 0.6]
      - type: contrast
        level_range: [0.6, 0.8]

property: label_constant
search_budget: 2000
compute_cost: low

use_cases:
  - Pre-deployment validation
  - Environmental robustness assessment
  - Camera/sensor variation testing
  - Production monitoring baselines

estimated_time: 10-15 minutes for 100 images
