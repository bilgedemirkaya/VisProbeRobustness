# Lighting Conditions (Legacy Preset)
# Tests robustness to brightness, contrast, and gamma variations

name: Lighting Conditions (Legacy)
description: Tests robustness to brightness, contrast, and gamma variations

threat_model: environmental
threat_model_description: Legacy lighting-focused subset of natural perturbations

legacy: true
migration_hint: Consider using 'natural' for broader coverage

strategies:
  - type: brightness
    min_level: 0.5
    max_level: 1.5

  - type: contrast
    min_level: 0.7
    max_level: 1.3

  - type: gamma
    min_level: 0.7
    max_level: 1.3

  - type: compositional
    name: dim_low_contrast
    components:
      - type: brightness
        level_range: [0.4, 0.6]
      - type: contrast
        level_range: [0.7, 0.9]

property: label_constant
search_budget: 1000
compute_cost: low

use_cases:
  - Outdoor cameras (varying daylight)
  - Time-of-day robustness
  - Low-light performance

estimated_time: 5-8 minutes for 100 images
